name: Gửi tin hằng ngày (GTalk Campaign)

# ====== KHUNG GIỜ GỬI (chỉ bắn Bot, KHÔNG crawl — roster do job crawl đã quét) ======
# Sửa dòng cron bên dưới để đổi giờ. Cron tính theo giờ UTC; VN = UTC + 7.
#   '0 1 * * *'  -> 01:00 UTC = 08:00 VN  (mặc định: gửi SAU giờ crawl 1 tiếng)
#   '0 2 * * *'  -> 02:00 UTC = 09:00 VN
# Lưu ý: nên để giờ gửi MUỘN HƠN giờ crawl (xem .github/workflows/daily-crawl.yml).
on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC = 08:00 giờ VN
  workflow_dispatch: {}     # cho phép bấm chạy tay trên tab Actions

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Gửi tin theo lộ trình (không crawl)
        run: node runner.js --run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_BUCKET: images
          OA_ID: ${{ secrets.OA_ID }}
          OA_TOKEN: ${{ secrets.OA_TOKEN }}
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
          GTALK_ENV: prod
          BACKFILL_ID_SPAN: '10000'
          MAX_TENURE_DAYS: '60'
          CONCURRENCY: '8'
